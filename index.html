<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>內部營運管理中樞</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css?v=20260615-msc-ot-0-1g">
</head>
<body class="h-screen overflow-hidden bg-slate-100 text-slate-800">
  <section id="loginView" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/55 p-4 backdrop-blur-sm">
    <div class="w-full max-w-md rounded-2xl bg-white p-7 shadow-2xl">
      <div class="mb-7 text-center">
        <div class="login-brand-mark mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-slate-900 text-white">
          <span class="text-2xl font-black">M</span>
        </div>
        <h1 class="text-2xl font-black">營運管理中樞</h1>
        <p id="sysStatus" class="mt-2 text-sm font-bold text-slate-500">請輸入帳號密碼完成授權</p>
        <a href="./frontdesk.html?v=20260615-msc-ot-0-1g" class="login-frontdesk-link mt-3 inline-flex rounded-full bg-teal-50 px-4 py-2 text-sm font-black text-teal-700 hover:bg-teal-100">
          前台師傅排班系統
        </a>
      </div>
      <div class="space-y-4">
        <input id="adminId" autocomplete="username" class="input" placeholder="帳號">
        <input id="adminPin" autocomplete="current-password" type="password" class="input" placeholder="密碼" onkeydown="if(event.key==='Enter') window.handleLogin && window.handleLogin()">
        <button id="loginBtn" class="btn-primary w-full py-3 text-lg" onclick="window.handleLogin && window.handleLogin()">
          <span id="loginBtnText">授權登入</span>
          <span id="loginLoader" class="loader hidden"></span>
        </button>
        <p id="loginErrorMsg" class="hidden text-center text-sm font-bold text-rose-600"></p>
      </div>
    </div>
  </section>

  <section id="adminDashboard" class="hidden h-full w-full flex">
    <div id="sidebarOverlay" class="fixed inset-0 z-40 hidden bg-slate-950/50 lg:hidden"></div>
    <aside id="adminSidebar" class="fixed inset-y-0 left-0 z-50 flex w-64 -translate-x-full flex-col bg-slate-950 text-slate-300 shadow-2xl transition-transform lg:relative lg:translate-x-0">
      <div class="flex items-center justify-between border-b border-slate-800 p-5">
        <div class="flex items-center gap-3">
          <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-teal-500 font-black text-white">M</div>
          <div>
            <h2 class="font-black text-white">管理營運系統</h2>
            <p id="roleLabel" class="text-xs font-bold text-slate-500">營運後台</p>
          </div>
        </div>
        <button id="closeSidebarBtn" class="rounded-lg p-2 text-slate-400 hover:bg-slate-800 lg:hidden">✕</button>
      </div>
      <nav id="adminNav" class="flex-1 space-y-2 overflow-y-auto p-3" aria-label="管理員導覽"></nav>
      <nav id="therapistNav" class="hidden flex-1 space-y-2 overflow-y-auto p-3" aria-label="師傅導覽"></nav>
      <div class="border-t border-slate-800 p-4">
        <button id="logoutBtn" class="w-full rounded-xl px-4 py-2 text-sm font-bold text-slate-400 hover:bg-slate-800 hover:text-white">登出系統</button>
      </div>
    </aside>

    <main class="flex h-full min-w-0 flex-1 flex-col">
      <header class="glass-panel z-10 flex h-16 items-center justify-between border-b border-slate-200 px-4 md:px-8">
        <div class="flex min-w-0 items-center gap-3">
          <button id="openSidebarBtn" class="rounded-lg p-2 text-slate-600 hover:bg-slate-200 lg:hidden">☰</button>
          <h2 id="pageTitle" class="truncate text-lg font-black md:text-xl">總覽儀表板</h2>
        </div>
        <div class="flex items-center rounded-xl bg-slate-100 p-1">
          <button id="prevMonthBtn" class="month-btn">◀</button>
          <span id="currentDateRange" class="min-w-28 px-3 text-center text-sm font-black md:text-base">--</span>
          <button id="nextMonthBtn" class="month-btn">▶</button>
        </div>
      </header>

      <div id="mainContent" class="flex-1 overflow-y-auto p-4 md:p-8">
        <section id="view-overview" class="view space-y-6"></section>
        <section id="view-dispatch" class="view hidden space-y-6"></section>
        <section id="view-customer" class="view hidden space-y-6"></section>
        <section id="view-personnel" class="view hidden space-y-6"></section>
        <section id="view-report" class="view hidden space-y-6"></section>
        <section id="view-system" class="view hidden space-y-6"></section>
        <section id="view-portal" class="view hidden space-y-6"></section>
      </div>
    </main>

    <nav id="mobileBottomNav" class="mobile-bottom-nav hidden" aria-label="手機主要導覽"></nav>
  </section>

  <div id="modalRoot"></div>
  <div id="snackbar" class="pointer-events-none fixed bottom-8 left-1/2 z-[90] w-[92%] -translate-x-1/2 translate-y-4 rounded-full bg-slate-900 px-6 py-3 text-center text-sm font-bold text-white opacity-0 shadow-xl transition-all md:w-auto"></div>

  <script>
    window.addEventListener("error", function (event) {
      var el = document.getElementById("loginErrorMsg");
      if (!el) return;
      el.textContent = "系統腳本載入失敗：" + event.message;
      el.classList.remove("hidden");
    });
  </script>
  <script src="./app.js?v=20260615-msc-ot-0-1g"></script>
  <script src="./report-accounting-patch.js?v=20260612-report-mobile"></script>
  <script src="./remittance-fields-patch.js?v=20260612-remittance-edit"></script>
</body>
</html>
