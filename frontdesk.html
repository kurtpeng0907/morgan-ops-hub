<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>專業按摩師排班與預約中樞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #fafafa; 
            color: #18181b; 
        }
        /* 極簡風格特製漸變與陰影 */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(244, 244, 245, 0.8);
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03);
        }
        .soft-input {
            background-color: #f4f4f5;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .soft-input:focus {
            background-color: #ffffff;
            border-color: #e4e4e7;
            box-shadow: 0 0 0 4px rgba(24, 24, 27, 0.05);
        }
        .tab-active { 
            background-color: #ffffff; 
            color: #18181b; 
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            font-weight: 700;
        }
        .tab-inactive { color: #71717a; font-weight: 500; }
        .tab-inactive:hover { color: #3f3f46; }
        
        .portal-tab-active { border-bottom: 2px solid #0f766e; color: #0f766e; font-weight: 700; }
        .portal-tab-inactive { color: #a1a1aa; font-weight: 500; }
        .portal-tab-inactive:hover { color: #52525b; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .loader { 
            border: 2px solid #e4e4e7; border-top: 2px solid #18181b; 
            border-radius: 50%; width: 16px; height: 16px; 
            animation: spin 0.8s linear infinite; display: inline-block; 
        }
        .loader-white { border-top-color: #ffffff; border-color: rgba(255,255,255,0.3); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        :root {
            --fd-ink: #172033;
            --fd-muted: #64748b;
            --fd-line: #dbe3ed;
            --fd-panel: #ffffff;
            --fd-canvas: #eef3f7;
            --fd-soft: #f4f7fa;
            --fd-accent: #0f766e;
            --fd-accent-strong: #0b5f59;
            --fd-accent-soft: #e7f6f3;
            --fd-warm: #b45309;
        }
        * { letter-spacing: 0 !important; }
        body.frontdesk-app {
            background: var(--fd-canvas);
            color: var(--fd-ink);
            padding: 0;
        }
        .frontdesk-shell { max-width: 1180px; margin: 0 auto; padding: 24px; }
        .frontdesk-topbar {
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 18px;
        }
        .frontdesk-brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .frontdesk-brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            background: var(--fd-ink);
            color: white;
            font-weight: 900;
            flex: 0 0 auto;
        }
        .frontdesk-brand h1 { font-size: 18px; font-weight: 900; line-height: 1.25; }
        .frontdesk-brand p { margin-top: 2px; color: var(--fd-muted); font-size: 12px; font-weight: 700; }
        .month-control {
            display: grid;
            grid-template-columns: 38px minmax(126px, auto) 38px;
            align-items: center;
            min-height: 44px;
            border: 1px solid var(--fd-line);
            border-radius: 10px;
            background: var(--fd-panel);
        }
        .month-control button { height: 42px; display: grid; place-items: center; color: var(--fd-muted); }
        .month-control button:hover { color: var(--fd-ink); background: var(--fd-soft); }
        .month-control span { text-align: center; color: var(--fd-ink); font-size: 14px; font-weight: 900; }
        .mode-switch {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            max-width: 440px;
            padding: 4px;
            margin: 0 0 20px;
            border: 1px solid var(--fd-line);
            border-radius: 10px;
            background: #e4eaf0;
        }
        .mode-switch button { min-height: 42px; border-radius: 7px; font-size: 14px; font-weight: 800; color: var(--fd-muted); }
        .mode-switch .tab-active { color: var(--fd-ink); background: white; box-shadow: 0 1px 3px rgba(15,23,42,.08); }
        .workspace-card {
            border: 1px solid var(--fd-line);
            border-radius: 12px;
            background: var(--fd-panel);
            box-shadow: 0 10px 30px rgba(15,23,42,.04);
        }
        .query-workspace { padding: 24px; }
        .workspace-heading { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
        .workspace-heading h2 { font-size: 24px; font-weight: 900; color: var(--fd-ink); }
        .workspace-heading p { margin-top: 5px; color: var(--fd-muted); font-size: 13px; font-weight: 600; }
        .query-search {
            max-width: none;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            padding: 0;
            margin: 0;
            border: 0;
            box-shadow: none;
            background: transparent;
        }
        .query-search input { min-height: 48px; border: 1px solid var(--fd-line); border-radius: 9px; background: var(--fd-soft); padding: 0 16px; }
        .query-search button { min-height: 48px; border-radius: 9px; background: var(--fd-ink); padding: 0 24px; }
        #searchErrorMsg { margin: 12px 0 0; text-align: left; }
        .login-shell { max-width: 460px; margin: 48px auto; padding: 28px; border-radius: 12px; }
        .portal-shell { padding: 0; border-radius: 12px; overflow: hidden; }
        .portal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 22px 24px;
            border-bottom: 1px solid var(--fd-line);
            background: #fff;
        }
        .portal-kicker { color: var(--fd-accent); font-size: 11px; font-weight: 900; text-transform: uppercase; }
        .portal-header h2 { margin-top: 3px; color: var(--fd-ink); font-size: 22px; font-weight: 900; }
        .portal-tabs {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 4px;
            margin: 0;
            padding: 8px 24px;
            border-bottom: 1px solid var(--fd-line);
            background: var(--fd-soft);
        }
        .portal-tabs button { min-height: 42px; padding: 0 14px; border-radius: 8px; color: var(--fd-muted); font-size: 14px; font-weight: 800; }
        .portal-tabs .portal-tab-active { border: 0; color: var(--fd-accent-strong); background: white; box-shadow: 0 1px 3px rgba(15,23,42,.08); }
        .portal-content { padding: 24px; }
        #portalSectionAppointments > .appointment-toolbar { margin-bottom: 20px; }
        #myAppointmentsContainer { gap: 20px; }
        #myAppointmentsContainer > .ops-grid { display: grid; gap: 16px; grid-template-columns: minmax(0, 1.35fr) minmax(280px, .65fr); }
        .ops-panel { border: 1px solid var(--fd-line); border-radius: 10px; background: white; padding: 18px; }
        .ops-panel.soft { background: var(--fd-soft); }
        .period-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; }
        .period-card { border: 1px solid var(--fd-line); border-radius: 9px; background: white; padding: 14px; }
        .period-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .period-card .metric-value { margin-top: 2px; color: var(--fd-ink); font-size: 20px; font-weight: 900; }
        .period-card .metric-value.accent { color: var(--fd-accent); }
        .period-card .metric-value.small { font-size: 15px; }
        .upcoming-item { width: 100%; border: 1px solid var(--fd-line); border-radius: 9px; background: white; padding: 13px; text-align: left; }
        .upcoming-item:hover { border-color: #83c9c1; background: #fbfefd; }
        #portalSectionProfile form, #portalSectionSchedule > div:not([id]) { border-radius: 10px !important; }
        #profileApprovalStatus, #scheduleApprovalStatus { margin-bottom: 16px; }
        #myAppointmentsCalendarGrid > div { border-radius: 9px !important; }
        .soft-input { border-color: var(--fd-line); background: var(--fd-soft); }
        .soft-input:focus { border-color: #6fbab2; box-shadow: 0 0 0 3px rgba(15,118,110,.10); }
        button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 3px solid rgba(15,118,110,.18); outline-offset: 2px; }
        @media (max-width: 767px) {
            .frontdesk-shell { padding: 12px; }
            .frontdesk-topbar { min-height: 58px; margin-bottom: 10px; gap: 10px; }
            .frontdesk-brand-mark { width: 36px; height: 36px; border-radius: 8px; }
            .frontdesk-brand h1 { font-size: 15px; }
            .frontdesk-brand p { display: none; }
            .month-control { grid-template-columns: 34px minmax(96px, auto) 34px; min-height: 40px; }
            .month-control button { height: 38px; }
            .month-control span { font-size: 12px; }
            .mode-switch { max-width: none; margin-bottom: 12px; }
            .query-workspace { padding: 16px; }
            .workspace-heading { display: block; margin-bottom: 16px; }
            .workspace-heading h2 { font-size: 20px; }
            .query-search { grid-template-columns: 1fr; }
            .query-search button { width: 100%; }
            .login-shell { margin: 20px auto; padding: 20px; }
            .portal-header { padding: 16px; }
            .portal-header h2 { font-size: 19px; }
            .portal-header .logout-label { display: none; }
            .portal-tabs { padding: 6px; position: sticky; top: 0; z-index: 20; }
            .portal-tabs button { min-height: 44px; padding: 0 6px; font-size: 12px; }
            .portal-content { padding: 14px; }
            #myAppointmentsContainer > .ops-grid { grid-template-columns: 1fr; }
            .period-grid { grid-template-columns: 1fr; }
            .period-card-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
            .period-card .metric-value { font-size: 18px; }
            .period-card .metric-value.small { font-size: 14px; }
            #myAppointmentsCalendarContainer { overflow-x: auto; }
            #myAppointmentsCalendarContainer > div { min-width: 650px; }
            #queryScheduleContainer { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
        }
        @media (max-width: 420px) {
            .frontdesk-brand-mark { display: none; }
            .period-card-grid { grid-template-columns: 1fr 1fr; }
            .appointment-toolbar { align-items: stretch !important; }
        }
    </style>
</head>
<body class="frontdesk-app min-h-screen selection:bg-zinc-200">

    <div class="frontdesk-shell w-full min-h-screen">
        
        <!-- 表頭設計 -->
        <header class="frontdesk-topbar">
            <div class="frontdesk-brand">
                <div class="frontdesk-brand-mark">M</div>
                <div><h1>Morgan 師傅工作台</h1><p>MSOT1.0 · 查班表、看行程、完成服務回報</p></div>
            </div>
            <div class="month-control">
                <button onclick="changeMonth(-1)" aria-label="上個月">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <span id="headerDateRange">載入中...</span>
                <button onclick="changeMonth(1)" aria-label="下個月">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </header>

        <!-- 主導航 -->
        <div class="mode-switch">
            <button onclick="switchTab('query')" id="tabQuery" class="tab-active transition-all">班表查詢</button>
            <button onclick="switchTab('edit')" id="tabEdit" class="tab-inactive transition-all">我的工作台</button>
        </div>

        <div id="mainContent">
            <!-- ==================== 查詢模式 ==================== -->
            <div id="viewQuery" class="workspace-card query-workspace transition-opacity duration-300">
                <div class="workspace-heading"><div><h2>查詢每月班表</h2><p>輸入師傅編號，即可查看該月每天的上班時段。</p></div></div>
                <div class="query-search">
                    <input type="text" id="searchInput" placeholder="請輸入欲查詢的師傅編號，如：001" class="flex-1 px-4 py-3 bg-transparent text-zinc-800 placeholder-zinc-400 outline-none font-medium" onkeypress="if(event.key === 'Enter') handleSearch()">
                    <button onclick="handleSearch()" id="searchBtn" class="bg-zinc-900 text-white hover:bg-zinc-800 font-bold text-sm flex items-center justify-center transition-all">
                        <span id="searchBtnText">查詢</span>
                        <div id="searchLoader" class="loader loader-white hidden ml-2"></div>
                    </button>
                </div>
                <p id="searchErrorMsg" class="text-rose-500 text-sm text-center -mt-8 mb-8 hidden font-medium"></p>

                <div id="queryResultArea" class="hidden opacity-0 transition-opacity duration-500">
                    <div class="flex items-center justify-between mb-8 px-2 border-b border-zinc-200/60 pb-6">
                        <div class="flex items-baseline gap-3">
                            <h2 class="text-3xl font-black text-zinc-900 tracking-tight" id="queryName">--</h2>
                            <span class="text-sm font-bold text-zinc-400" id="queryId">ID: --</span>
                        </div>
                        <span class="px-3 py-1 bg-zinc-100 text-zinc-500 rounded-lg text-xs font-bold tracking-wider uppercase">排班狀態已同步</span>
                    </div>
                    
                    <div class="hidden lg:grid grid-cols-7 gap-4 mb-3 px-2 text-center text-xs font-bold text-zinc-400 uppercase tracking-widest">
                        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div>
                        <div class="text-rose-400/80">Sat</div><div class="text-rose-400/80">Sun</div>
                    </div>

                    <div id="queryScheduleContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3 md:gap-4"></div>
                </div>
            </div>

            <!-- ==================== 個人中樞模式 ==================== -->
            <div id="viewEdit" class="hidden transition-opacity duration-300">
                
                <!-- 登入卡片 -->
                <div id="loginForm" class="workspace-card login-shell">
                    <div class="mb-8">
                        <h2 class="text-2xl font-black text-zinc-900 mb-2 tracking-tight">安全驗證</h2>
                        <p class="text-sm text-zinc-500 font-medium">請登入以檢視個人預約與編輯排班。</p>
                    </div>
                    <div class="space-y-4">
                        <input type="text" id="authId" placeholder="專屬編號 (ID)" class="w-full px-5 py-3.5 soft-input rounded-xl outline-none font-medium text-zinc-800 placeholder-zinc-400">
                        <input type="password" id="authPin" placeholder="密碼 (PIN)" class="w-full px-5 py-3.5 soft-input rounded-xl outline-none font-medium text-zinc-800 placeholder-zinc-400" onkeypress="if(event.key === 'Enter') handleLogin()">
                        <button onclick="handleLogin()" id="loginBtn" class="w-full bg-zinc-900 text-white px-8 py-3.5 rounded-xl hover:bg-zinc-800 font-bold flex items-center justify-center transition-all mt-2">
                            <span id="loginBtnText">登入專屬中樞</span>
                            <div id="loginLoader" class="loader loader-white hidden ml-2"></div>
                        </button>
                        <p id="loginErrorMsg" class="text-rose-500 text-sm text-center hidden font-medium"></p>
                    </div>
                </div>

                <!-- 師傅專屬中樞介面 -->
                <div id="editForm" class="hidden workspace-card portal-shell w-full mx-auto">
                    
                    <div class="portal-header">
                        <div>
                            <p class="portal-kicker">已登入師傅</p>
                            <h2 id="loggedInName">--</h2>
                        </div>
                        <button onclick="logout()" class="text-sm text-zinc-500 hover:text-zinc-900 font-bold transition-colors bg-zinc-100 px-4 py-2 rounded-lg"><span class="logout-label">安全</span>登出</button>
                    </div>

                    <!-- 內部次導航 -->
                    <div class="portal-tabs">
                        <button onclick="switchPortalTab('appointments')" id="portalTabAppointments" class="portal-tab-active transition-all">今日工作</button>
                        <button onclick="switchPortalTab('schedule')" id="portalTabSchedule" class="portal-tab-inactive transition-all">我的排班</button>
                        <button onclick="switchPortalTab('profile')" id="portalTabProfile" class="portal-tab-inactive transition-all">個人資料</button>
                    </div>

                    <div class="portal-content">

                    <!-- 區塊 A：個人人事資料 -->
                    <div id="portalSectionProfile" class="hidden">
                        <div id="profileApprovalStatus" class="mb-5"></div>
                        <div id="profileFormContainer"></div>
                    </div>
                    
                    <!-- 區塊 B：排班設定 -->
                    <div id="portalSectionSchedule" class="hidden max-w-2xl mx-auto">
                        <div id="scheduleApprovalStatus" class="mb-5"></div>
                        <div class="mb-8">
                            <label class="block text-xs font-bold text-zinc-500 uppercase tracking-widest mb-3">請選擇欲填寫之週次</label>
                            <select id="weekSelector" onchange="renderEditInputs()" class="w-full px-5 py-3.5 bg-white border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 shadow-sm focus:border-zinc-400 focus:ring-4 focus:ring-zinc-100 transition-all"></select>
                        </div>
                        <div id="editInputsContainer" class="space-y-3 mb-10"></div>
                        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                            <p id="saveMsg" class="text-sm font-bold text-teal-600 hidden"></p>
                            <button onclick="saveSchedule()" id="saveBtn" class="bg-zinc-900 text-white w-full sm:w-auto px-10 py-3.5 rounded-xl hover:bg-zinc-800 font-bold transition-all shadow-[0_4px_14px_0_rgba(0,0,0,0.1)] flex justify-center items-center sm:ml-auto">
                                <span id="saveBtnText">送出班表變更審核</span>
                                <div id="saveLoader" class="loader loader-white hidden ml-2"></div>
                            </button>
                        </div>
                    </div>

                    <!-- 區塊 C：預約與回報 -->
                    <div id="portalSectionAppointments" class="block">
                        <div class="appointment-toolbar flex flex-col sm:flex-row items-start sm:items-end justify-between gap-4">
                            <div>
                                <p class="text-sm text-zinc-500 font-medium">此處顯示您於 <span id="apptMonthLabel" class="font-bold text-zinc-800"></span> 的預約排程。<br>服務完成後，請點擊區塊填寫「實際回款金額」與「顧客偏好備註」。</p>
                            </div>
                            <div class="flex items-center gap-2 bg-zinc-100 p-1.5 rounded-xl shrink-0 border border-zinc-200/60 shadow-inner w-full sm:w-auto">
                                <button id="btnApptViewList" onclick="switchApptView('list')" class="flex-1 sm:flex-none px-5 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-zinc-800 transition-all tracking-wide">分類列表</button>
                                <button id="btnApptViewCal" onclick="switchApptView('calendar')" class="flex-1 sm:flex-none px-5 py-2 text-xs font-bold rounded-lg text-zinc-500 hover:text-zinc-800 transition-all tracking-wide">月度日曆</button>
                                <button onclick="renderMyAppointments()" class="ml-1 px-3 py-2 text-zinc-500 hover:text-zinc-800 transition-colors" title="重新整理">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                </button>
                            </div>
                        </div>

                        <!-- 模式一：分類列表 (下一個/今日/本週/本月) -->
                        <div id="myAppointmentsContainer" class="flex flex-col gap-8 w-full"></div>

                        <!-- 模式二：月度日曆 -->
                        <div id="myAppointmentsCalendarContainer" class="hidden">
                            <div class="grid grid-cols-7 gap-1 md:gap-3 mb-2 px-1 md:px-2 text-center text-[10px] md:text-xs font-bold text-zinc-400 uppercase tracking-widest">
                                <div class="text-rose-400/80">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-rose-400/80">Sat</div>
                            </div>
                            <div id="myAppointmentsCalendarGrid" class="grid grid-cols-7 gap-1 md:gap-3"></div>
                        </div>
                    </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 師傅專屬：服務紀錄回報 Modal (結合打勾完成) -->
    <div id="therapistRecordModal" class="fixed inset-0 z-[70] flex items-center justify-center bg-zinc-900/60 hidden p-4 backdrop-blur-sm">
        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col">
            <h2 class="text-xl font-black mb-1 text-zinc-900 flex items-center gap-2">
                <svg class="w-6 h-6 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                填寫服務紀錄與回款
            </h2>
            <p class="text-sm text-zinc-500 mb-6 pb-4 border-b border-zinc-100">將服務細節與帳務同步於雲端，打造無微不至的顧客體驗。</p>
            
            <div class="flex-1 overflow-y-auto space-y-5 no-scrollbar pr-1">
                <div class="bg-zinc-50 p-4 rounded-2xl border border-zinc-100 flex justify-between items-center shadow-inner">
                    <div>
                        <p class="text-xs text-zinc-400 font-bold tracking-widest uppercase mb-1">顧客姓名</p>
                        <p class="text-lg font-black text-zinc-800" id="trModalCustomerName">--</p>
                    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxm7aWFLVk0XeTLV39LnaiTI5Z8c76YNlcPMYWyR17HGaU4QvzHJm32nWeCHsnaknVx/exec";

        const cleanPin = (value = "") => String(value ?? "").replace(/^'/, "").trim();

            const text = cleanPin(value);
            return /^0\d+/.test(text) ? `'${text}` : text;
        };
        const cleanStaffCode = (value = "") => String(value ?? "").replace(/^'/, "").trim();
        const APPROVAL_PREFIX = "SYS_APPROVAL_";
        const APPOINTMENT_META_PREFIX = "SYS_APPT_META_";

        const approvalTypeLabel = (type) => ({ profile: "人事資料", schedule: "班表", password: "密碼" }[type] || type);
        const approvalStatusLabel = (status) => ({ pending: "待審核", approved: "已核可", rejected: "已退回" }[status] || status);
        const findTherapistId = (enteredId = "") => {
            const exact = cleanStaffCode(enteredId);
            if (globalDB.therapists[exact]) return exact;
            if (!/^\d+$/.test(exact)) return "";
            const normalized = exact.replace(/^0+/, "");
            const matches = Object.keys(globalDB.therapists).filter((id) => cleanStaffCode(id).replace(/^0+/, "") === normalized);
            return matches.length === 1 ? matches[0] : "";
        };
        const pinMatches = (stored, entered) => {
            const storedText = cleanPin(stored);
            const enteredText = cleanPin(entered);
            if (storedText === enteredText) return true;
            if (/^\d+$/.test(storedText) && /^\d+$/.test(enteredText)) {
                return storedText.replace(/^0+/, "") === enteredText.replace(/^0+/, "");
            }
            return false;
        };
        const THERAPIST_PROFILE_DEFAULTS = {
            nickname: "",
            name: "",
            contact: "",
            height: "",
            weight: "",
            age: "",
            specialties: "",
            notes: "",
            bio: "",

                ...therapist,

            };

        const esc = (value = "") => String(value ?? "").replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
        const compactStats = (therapist = {}) => [
            therapist.age ? `${therapist.age}歲` : "",
            therapist.height ? `${therapist.height}cm` : "",
            therapist.weight ? `${therapist.weight}kg` : ""
        ].filter(Boolean).join(" / ");
        const ownApprovals = () => Object.values(globalDB.approvals || {})
            .filter((item) => item.therapistId === currentUserId)
            .sort((a, b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")));

        // 載入最新的課程價格與抽成模型

            'C120': { name: 'C課程(120m) 指油+泰', duration: 120, price: 2800, therapistCut: 1600 },

            'D120': { name: 'D課程(120m) 指+油', duration: 120, price: 2400, therapistCut: 1400 },
            'D90': { name: 'D課程(90m) 指+油', duration: 90, price: 2100, therapistCut: 1200 },
            'OUT_DAY': { name: '外出 (22:00前)', duration: 120, price: 3200, therapistCut: 2000 },
            'OUT_NIGHT': { name: '外出 (22:00後)', duration: 120, price: 3500, therapistCut: 2200 }
        };

        window.formatTimeInput = function(el) {
            let val = el.value.trim();
            if (val === "") { el.value = "休假"; return; }
            if (val.includes("休") || val === "尚未排班") return;
            val = val.replace(/\s*[-~到至]\s*/g, '-');
            val = val.replace(/\b(\d{1,2})(\d{2})\b/g, (match, h, m) => h.padStart(2, '0') + ':' + m);
            let parts = val.split('-');
            if (parts.length === 2) {
                parts = parts.map(p => {
                    let time = p.trim();
                    if (/^\d{1,2}$/.test(time)) return time.padStart(2, '0') + ':00';
                    return time;
                });
                val = parts.join('-');
            }
            el.value = val;
        };

        function todayKey() {
            return new Date().toISOString().split('T')[0];
        }

        function centerTodayInDateScroll(root = document) {
            const today = todayKey();
            root.querySelectorAll(`[data-date-key="${today}"]`).forEach((node) => {
                const scroller = node.closest('[data-date-scroll], .overflow-x-auto, .table-wrap');
                if (!scroller || scroller.scrollWidth <= scroller.clientWidth) return;
                const left = node.offsetLeft - (scroller.clientWidth / 2) + (node.clientWidth / 2);
                scroller.scrollTo({ left: Math.max(0, left), behavior: 'smooth' });
            });
        }

        function timeToMinutes(timeStr) {
            if(!timeStr) return 0;
            const parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseInt(parts[1]);
        }

        function showSnackbar(msg, type = 'success') {
            const snackbar = document.getElementById('snackbar');
            const icon = document.getElementById('snackbarIcon');

                icon.innerHTML = `<svg class="w-5 h-5 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            } else {
                icon.innerHTML = `<svg class="w-5 h-5 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }
            
            snackbar.classList.remove('opacity-0', 'translate-y-4');
            snackbar.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { snackbar.classList.add('opacity-0', 'translate-y-4'); snackbar.classList.remove('opacity-100', 'translate-y-0'); }, 3000);
        }

        function generateMonthData() {
            monthDatesList = [];
            const date = new Date(currentYear, currentMonth, 1);
            const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
            while (date.getMonth() === currentMonth) {
                monthDatesList.push({
                    key: `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`,
                    dayDisplay: String(date.getDate()).padStart(2,'0'),
                    dayOfWeek: dayNames[date.getDay()],
                    isWeekend: date.getDay() === 0 || date.getDay() === 6,
                    rawDay: date.getDay()
                });
                date.setDate(date.getDate() + 1);
            }
            document.getElementById('headerDateRange').innerText = `${currentYear} 年 ${String(currentMonth+1).padStart(2,'0')} 月`;
            if(document.getElementById('apptMonthLabel')) document.getElementById('apptMonthLabel').innerText = `${currentYear}年${currentMonth+1}月`;
            groupDatesIntoWeeks();
        }

        function groupDatesIntoWeeks() {
            monthWeeksList = [];
            let currentWeek = [];
            monthDatesList.forEach(d => {
                currentWeek.push(d);
                if (d.rawDay === 0 || d.key === monthDatesList[monthDatesList.length-1].key) {
                    monthWeeksList.push([...currentWeek]);
                    currentWeek = [];
                }
            });
        }

        window.changeMonth = async function(offset) {
            currentMonth += offset;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            generateMonthData();
            
            if (currentUserId && !document.getElementById('editForm').classList.contains('hidden')) {
                populateWeekSelector();
                renderEditInputs();
                renderMyAppointments();
            }
            if (!document.getElementById('queryResultArea').classList.contains('hidden')) {
                handleSearch();
            }
        }

        async function fetchDatabase() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            try {
                const cacheBuster = "?t=" + new Date().getTime();
                const res = await fetch(API_URL + cacheBuster, { signal: controller.signal, cache: "no-store" });
                clearTimeout(timeoutId);
                
                if (!res.ok) throw new Error(`HTTP 錯誤狀態碼：${res.status}`);
                
                const text = await res.text();
                let nextDB;
                try {
                    nextDB = JSON.parse(text);
                } catch (parseError) {
                    throw new Error("雲端回傳格式異常。");
                }

                if (!nextDB || typeof nextDB !== 'object' || nextDB.success === false) {
                    throw new Error(nextDB?.error || "雲端拒絕存取。");
                }
                if (!['therapists', 'schedules', 'appointments', 'customers'].every(key => nextDB[key] && typeof nextDB[key] === 'object')) {
                    throw new Error("雲端資料不完整，已保留目前畫面。");
                }
                globalDB = nextDB;

                if (!globalDB.therapists) globalDB.therapists = {};
                if (!globalDB.appointments) globalDB.appointments = {};
                if (!globalDB.customers) globalDB.customers = {};
                globalDB.approvals = {};
                globalDB.appointmentMeta = {};

                Object.keys(globalDB.customers).forEach(key => {
                    if (!key.startsWith('SYS_THERAPIST_PROFILE_')) return;
                    const id = key.replace('SYS_THERAPIST_PROFILE_', '');
                    let profile = {};
                    try { profile = JSON.parse(globalDB.customers[key].notes || "{}"); } catch(e) {}
                    globalDB.therapists[id] = { ...(globalDB.therapists[id] || {}), ...profile };
                });
                Object.keys(globalDB.customers).forEach(key => {
                    if (!key.startsWith(APPOINTMENT_META_PREFIX)) return;
                    try {
                        const meta = JSON.parse(globalDB.customers[key].notes || "{}");
                        const id = meta.id || key.replace(APPOINTMENT_META_PREFIX, '');
                        if (id) globalDB.appointmentMeta[id] = { ...meta, id };
                    } catch(e) {}
                });
                Object.keys(globalDB.therapists).forEach(id => {
                    globalDB.therapists[id] = normalizeTherapistProfile(globalDB.therapists[id]);
                });
                Object.keys(globalDB.customers).forEach(key => {
                    if (!key.startsWith(APPROVAL_PREFIX)) return;
                    try {
                        const approval = JSON.parse(globalDB.customers[key].notes || "{}");
                        if (approval.id) globalDB.approvals[approval.id] = approval;
                    } catch(e) {}
                });
                
                Object.keys(globalDB.appointments).forEach(key => {
                    let appt = globalDB.appointments[key];
                    const meta = globalDB.appointmentMeta[key] || {};
                    ['bookingStage', 'isCompleted', 'collectedPrice', 'remittanceDue', 'remittancePaid', 'remittanceMethod', 'selectionId'].forEach(field => {
                        if (Object.prototype.hasOwnProperty.call(meta, field)) appt[field] = meta[field];
                    });
                    appt.id = key; 
                    if (appt.date && (appt.date.includes(' ') || appt.date.includes('T'))) {
                        try {
                            const d = new Date(appt.date);
                            if (!isNaN(d.getTime())) appt.date = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                        } catch(e) {}
                    }
                    if (appt.time) {
                        const timeStr = String(appt.time);
                        if (timeStr.includes('GMT') || timeStr.includes('1899') || timeStr.includes('T')) {
                            const timeMatch = timeStr.match(/(\d{2}):(\d{2}):\d{2}/);
                            if (timeMatch) appt.time = `${timeMatch[1]}:${timeMatch[2]}`;
                        }
                    }
                });
            } catch (e) { console.error("API 連線異常"); throw e; }
        }

        async function postToDatabase(payload) {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                redirect: 'manual',
                cache: "no-store"
            });
            if (res.type === 'opaqueredirect' || res.status === 0 || (res.status >= 300 && res.status < 400)) {
                return { ok: true, redirected: true };
            }
            const text = await res.text();
            try {
                const result = text ? JSON.parse(text) : { ok: true };
                if (result?.success === false) throw new Error(result.error || "雲端拒絕寫入");
                return result;
            } catch (e) {
                if (/雲端拒絕|unauthorized|quota|exceeded/i.test(String(e?.message || e))) throw e;
                return { ok: true, raw: text };
            }
        }

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
        let batchSupportPromise = null;

        function supportsBatchWrites() {
            if (!batchSupportPromise) {
                batchSupportPromise = fetch(`${API_URL}?mode=capabilities&t=${Date.now()}`, { cache: 'no-store' })
                    .then(res => res.ok ? res.json() : null)
                    .then(payload => payload?.capabilities?.batch === true)
                    .catch(() => false);
            }
            return batchSupportPromise;
        }

        async function postActionsAndVerify(actions, verifier, label = "資料") {
            actions = actions.filter(Boolean);
            if (actions.length > 1 && await supportsBatchWrites()) {
                await postToDatabase({ action: 'batch', data: { actions } });
            } else {
                for (const payload of actions) await postToDatabase(payload);
            }
            for (const delay of [350, 700, 1200, 2000, 3000]) {
                await wait(delay);
                try {
                    await fetchDatabase();
                    if (verifier(globalDB)) return true;
                } catch(e) {}
            }
            throw new Error(`${label}尚未獲得雲端確認`);
        }

        function postAndVerify(payload, verifier, label) {
            return postActionsAndVerify([payload], verifier, label);
        }

        async function recordFrontdeskLogin(id) {
            if (!id) return;
            if (!globalDB.customers) globalDB.customers = {};
            const store = globalDB.customers[FRONTDESK_LOGIN_LOG_KEY] || { name: "前台師傅登入紀錄", notes: "", records: [] };
            store.records = store.records || [];
            store.records.push({
                id: `FDLOGIN-${Date.now().toString(36).toUpperCase()}`,
                at: new Date().toISOString(),
                therapistId: id,
                therapistName: therapistName(id),
                source: location.hostname || "local",
                path: location.pathname || "",
                device: navigator.userAgent || "",
                width: window.innerWidth || 0
            });
            store.records = store.records.slice(-200);
            globalDB.customers[FRONTDESK_LOGIN_LOG_KEY] = store;
            try {
                await postToDatabase({ action: 'saveCustomer', data: { phone: FRONTDESK_LOGIN_LOG_KEY, ...store } });
            } catch (e) {
                console.warn("前台登入紀錄寫入失敗，不影響登入。", e);
            }
        }

        async function createApprovalRequest(type, data, before = {}) {
            if (!currentUserId) throw new Error("尚未登入");
            const id = `REQ-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 6)}`.toUpperCase();
            const request = {
                id,
                type,
                status: "pending",
                therapistId: currentUserId,
                therapistName: therapistName(currentUserId),
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
                data,
                before
            };
            globalDB.approvals[id] = request;
            globalDB.customers[approvalKey(id)] = {
                name: `待審核-${approvalTypeLabel(type)}-${therapistName(currentUserId)}`,
                notes: JSON.stringify(request),
                records: []
            };
            const key = approvalKey(id);
            await postAndVerify(
                { action: 'saveCustomer', data: { phone: key, ...globalDB.customers[key] } },
                cloud => {
                    const saved = cloud.customers?.[key];
                    return saved && String(saved.notes || '') === JSON.stringify(request);
                },
                "送審資料"
            );
            renderApprovalStatusBlocks();
            return request;
        }

        function collectProfile(form) {
            const data = Object.fromEntries(new FormData(form).entries());
            Object.keys(THERAPIST_PROFILE_DEFAULTS).forEach((key) => data[key] = String(data[key] || "").trim());
            data.nickname = globalDB.therapists[currentUserId]?.nickname || "";
            data.id = currentUserId;
            return data;
        }

        window.renderMyProfile = function() {
            const container = document.getElementById('profileFormContainer');
            if (!container || !currentUserId) return;
            const profile = globalDB.therapists[currentUserId] || {};
            container.innerHTML = `
                <div class="grid gap-5 lg:grid-cols-[1fr_340px]">
                    <form id="profileEditForm" class="rounded-3xl border border-zinc-200 bg-white p-5">
                        <div class="mb-5 border-b border-zinc-100 pb-4">
                            <h3 class="text-xl font-black text-zinc-900">我的人事資料</h3>
                            <p class="mt-1 text-sm font-medium text-zinc-500">修改後會送交後台審核，核可後才會更新正式資料。</p>
                        </div>
                        <div class="grid gap-4 md:grid-cols-2">${profileFieldsHtml(profile)}</div>
                        <div class="mt-5 flex justify-end"><button class="bg-teal-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-teal-700">送出人事資料審核</button></div>
                    </form>
                    <form id="passwordChangeForm" class="rounded-3xl border border-zinc-200 bg-zinc-50 p-5 h-fit">
                        <h3 class="text-lg font-black text-zinc-900">變更登入密碼</h3>
                        <p class="mt-1 mb-4 text-sm font-medium text-zinc-500">新密碼限 4 位數字，更新後下次請用新 PIN 登入。</p>
                        <div class="space-y-3">
                            <input name="currentPin" type="password" inputmode="numeric" maxlength="8" class="w-full px-4 py-3 bg-white border border-zinc-200 rounded-xl outline-none font-bold" placeholder="目前 PIN">
                            <input name="newPin" type="password" inputmode="numeric" maxlength="4" class="w-full px-4 py-3 bg-white border border-zinc-200 rounded-xl outline-none font-bold" placeholder="新 PIN，4 位數字">
                            <input name="confirmPin" type="password" inputmode="numeric" maxlength="4" class="w-full px-4 py-3 bg-white border border-zinc-200 rounded-xl outline-none font-bold" placeholder="再次輸入新 PIN">
                            <button class="w-full bg-zinc-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-zinc-800">更新密碼</button>
                        </div>
                        <p id="passwordChangeMsg" class="mt-3 hidden text-sm font-bold text-rose-600"></p>
                    </form>
                </div>`;
            document.getElementById('profileEditForm').onsubmit = async (event) => {
                event.preventDefault();
                const btn = event.currentTarget.querySelector('button');
                btn.disabled = true; btn.innerText = "送審中...";
                try {
                    await createApprovalRequest("profile", collectProfile(event.currentTarget), profile);
                    showSnackbar("✅ 人事資料變更已送出審核。", "success");
                } catch(e) {
                    showSnackbar("❌ 送審失敗，請稍後再試。", "error");
                } finally {
                    btn.disabled = false; btn.innerText = "送出人事資料審核";
                }
            };
            document.getElementById('passwordChangeForm').onsubmit = async (event) => {
                event.preventDefault();
                const data = Object.fromEntries(new FormData(event.currentTarget).entries());
                const msg = document.getElementById('passwordChangeMsg');
                msg.classList.add('hidden');
                if (!pinMatches(profile.pin, data.currentPin)) {
                    msg.innerText = "目前 PIN 不正確。"; msg.classList.remove('hidden'); return;
                }
                if (!/^\d{4}$/.test(String(data.newPin || ""))) {
                    msg.innerText = "新 PIN 必須是 4 位數字。"; msg.classList.remove('hidden'); return;
                }
                if (data.newPin !== data.confirmPin) {
                    msg.innerText = "兩次輸入的新 PIN 不一致。"; msg.classList.remove('hidden'); return;
                }
                const btn = event.currentTarget.querySelector('button');
                btn.disabled = true; btn.innerText = "更新中...";
                try {
                    const nextPin = cleanPin(data.newPin);
                    globalDB.therapists[currentUserId] = { ...profile, pin: nextPin };
                    await postAndVerify(
                        { action: 'addTherapist', data: therapistWritePayload(currentUserId, { ...globalDB.therapists[currentUserId], pin: nextPin }) },
                        cloud => cleanPin(cloud.therapists?.[currentUserId]?.pin) === nextPin,
                        "新密碼"
                    );
                    profile.pin = nextPin;
                    event.currentTarget.reset();
                    showSnackbar("✅ 密碼已更新，下次請用新 PIN 登入。", "success");
                } catch(e) {
                    globalDB.therapists[currentUserId] = { ...profile, pin: cleanPin(profile.pin) };
                    showSnackbar("❌ 密碼更新失敗，請稍後再試。", "error");
                } finally {
                    btn.disabled = false; btn.innerText = "更新密碼";
                }
            };
        };

        window.switchPortalTab = function(tabName) {
            ['profile', 'schedule', 'appointments'].forEach(n => {
                const el = document.getElementById(`portalTab${n.charAt(0).toUpperCase() + n.slice(1)}`);
                if(n === tabName) el.className = "portal-tab-active transition-all";
                else el.className = "portal-tab-inactive transition-all";
                
                const section = document.getElementById(`portalSection${n.charAt(0).toUpperCase() + n.slice(1)}`);
                if (n === tabName) section.classList.remove('hidden');
                else section.classList.add('hidden');
            });
            if(tabName === 'profile') { renderApprovalStatusBlocks(); renderMyProfile(); }
            if(tabName === 'schedule') renderApprovalStatusBlocks();
            if(tabName === 'appointments') renderMyAppointments();
        };

                btnList.className = "flex-1 sm:flex-none px-5 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-zinc-800 transition-all";

                document.getElementById('myAppointmentsCalendarContainer').classList.remove('hidden');

        // ================= 查詢模式邏輯 =================
        window.handleSearch = async function() {
            const inputId = document.getElementById('searchInput').value.trim();

            const btn = document.getElementById('searchBtn');
            const loader = document.getElementById('searchLoader');
            const btnText = document.getElementById('searchBtnText');

            if(!inputId) return;
            btn.disabled = true; btnText.innerText = ""; loader.classList.remove('hidden'); err.classList.add('hidden');
            
            try {
                await fetchDatabase();
                const id = findTherapistId(inputId);
                if (!id) {
                    err.innerText = "查無此編號，請重新輸入。"; err.classList.remove('hidden'); 
                    return;
                }
                
                document.getElementById('queryName').innerText = therapistName(id);
                document.getElementById('queryId').innerText = `ID: ${id}`;
                
                const sched = globalDB.schedules[id] || {};
                const container = document.getElementById('queryScheduleContainer'); container.innerHTML = '';
                
                const firstDayMap = { 1: 'lg:col-start-1', 2: 'lg:col-start-2', 3: 'lg:col-start-3', 4: 'lg:col-start-4', 5: 'lg:col-start-5', 6: 'lg:col-start-6', 0: 'lg:col-start-7' };
                
                monthDatesList.forEach((d, index) => {

                    const bg = isOff ? "bg-zinc-50/50 border-zinc-200/50 border-dashed" : "bg-white border-zinc-200/80 shadow-[0_2px_8px_-3px_rgba(0,0,0,0.05)]";
                    const textCol = isOff ? "text-zinc-400" : "text-zinc-800";
                    const dateLabelCol = d.isWeekend ? "text-rose-400 font-bold" : "text-zinc-400 font-medium";

                            <div class="flex justify-between items-center mb-3">

                btn.disabled = false; btnText.innerText = "查詢"; loader.classList.add('hidden');
