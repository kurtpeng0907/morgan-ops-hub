        // ================= 個人中樞模式邏輯 =================
        window.handleLogin = async function() {
            const inputId = document.getElementById('authId').value.trim(), pin = document.getElementById('authPin').value.trim();
            const err = document.getElementById('loginErrorMsg'), btn = document.getElementById('loginBtn');
            const loader = document.getElementById('loginLoader');
            const btnText = document.getElementById('loginBtnText');

            if(!inputId||!pin) return;

            btn.disabled = true; btnText.innerText = ""; loader.classList.remove('hidden'); err.classList.add('hidden');
            try {
                await fetchDatabase();
                const id = findTherapistId(inputId);
                if (globalDB.therapists[id] && pinMatches(globalDB.therapists[id].pin, pin)) {
                    currentUserId = id;
                    document.getElementById('loggedInName').innerText = therapistName(id);
                    populateWeekSelector();
                    renderEditInputs();
                    switchPortalTab('appointments');
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('editForm').classList.remove('hidden');
                    recordFrontdeskLogin(id);
                } else { err.innerText = "身分驗證失敗，請檢查編號或密碼。"; err.classList.remove('hidden'); }
            } catch (error) { err.innerText = `連線異常，請稍後重試。`; err.classList.remove('hidden'); } 
            finally { btn.disabled = false; btnText.innerText = "登入專屬中樞"; loader.classList.add('hidden'); }
        };

        window.populateWeekSelector = function() {
            const sel = document.getElementById('weekSelector'); sel.innerHTML = '';
            const monthStr = String(currentMonth + 1).padStart(2, '0');
            monthWeeksList.forEach((week, idx) => {
                const start = `${monthStr}/${week[0].dayDisplay}`;
                const end = `${monthStr}/${week[week.length-1].dayDisplay}`;
                sel.innerHTML += `<option value="${idx}">第 ${idx+1} 週 （${start} - ${end}）</option>`;
            });
            const todayKey = new Date().toISOString().split('T')[0];
            const currentWeekIdx = monthWeeksList.findIndex((week) => week.some((d) => d.key === todayKey));
            sel.value = currentWeekIdx >= 0 ? String(currentWeekIdx) : '0';
        };

        window.renderEditInputs = function() {
            const weekIdx = document.getElementById('weekSelector').value;
            const weekDays = monthWeeksList[weekIdx] || [];
            const container = document.getElementById('editInputsContainer'); container.innerHTML = '';
            const sched = globalDB.schedules[currentUserId] || {};
            
            weekDays.forEach(d => {
                const isWeekend = d.isWeekend ? 'text-rose-500 font-bold' : 'text-zinc-600 font-bold';
                const fullDateDisplay = `${String(currentMonth + 1).padStart(2, '0')}/${d.dayDisplay}`;
                
                container.innerHTML += `
                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-4 bg-white border border-zinc-200 rounded-xl hover:border-zinc-300 transition-colors gap-3">
                        <div class="sm:w-1/3 text-sm tracking-wide ${isWeekend} flex items-center gap-2">
                            <span class="w-10 text-xs font-medium text-zinc-400 uppercase tracking-widest">${d.dayOfWeek}</span>
                            ${fullDateDisplay}
                        </div>
                        <input type="text" id="input_${d.key}" value="${sched[d.key] || ''}" placeholder="例：1200-2200 (留白為休假)" class="w-full sm:w-2/3 px-4 py-2.5 soft-input rounded-lg outline-none font-medium text-zinc-800" onfocus="if(this.value==='休假') this.value='';" onblur="formatTimeInput(this)">
                    </div>`;
            });
        };

        window.saveSchedule = async function() {
            const btn = document.getElementById('saveBtn'), msg = document.getElementById('saveMsg');
            const loader = document.getElementById('saveLoader');
            const btnText = document.getElementById('saveBtnText');

            btn.disabled = true; btnText.innerText = "送審中..."; loader.classList.remove('hidden'); msg.classList.add('hidden');

            const weekIdx = document.getElementById('weekSelector').value;
            const weekDays = monthWeeksList[weekIdx] || [];
            let payloadData = { schedule: {}, weekLabel: document.getElementById('weekSelector').selectedOptions[0]?.textContent || "" };
            
            weekDays.forEach(d => { payloadData.schedule[d.key] = document.getElementById(`input_${d.key}`).value.trim() || "休假"; });

            try {
                const before = {};
                weekDays.forEach(d => { before[d.key] = (globalDB.schedules[currentUserId] || {})[d.key] || "休假"; });
                await createApprovalRequest("schedule", payloadData, before);
                showSnackbar("✅ 班表變更已送出審核。", "success");
            } catch (e) {
                showSnackbar("❌ 送審失敗，請檢查網路連線。", "error");
            } finally {
                btn.disabled = false; btnText.innerText = "送出班表變更審核"; loader.classList.add('hidden');
            }
        };

        // ================= 預約與回報模組 (智慧時序分類引擎 & 日曆渲染) =================
        const createApptCardHtml = (appt, allApptsData) => {
            const serviceName = COURSE_CATALOG[appt.service] ? COURSE_CATALOG[appt.service].name : (appt.service || '一般預約');
            let roomBadgeColor = 'bg-zinc-100 text-zinc-600 border-zinc-200';
            if (appt.room === 'R') roomBadgeColor = 'bg-amber-50 text-amber-700 border-amber-200';
            if (appt.room === 'T') roomBadgeColor = 'bg-teal-50 text-teal-700 border-teal-200';
            if (appt.room === 'OUT') roomBadgeColor = 'bg-rose-50 text-rose-700 border-rose-200';
            const roomLabel = appt.room === 'OUT' ? '外出' : `${appt.room} 房`;

            const isCompleted = appt.isCompleted === true || String(appt.isCompleted) === 'true';
            const completedBadge = isCompleted ? `<span class="ml-1 text-[10px] bg-teal-100 text-teal-700 px-1.5 py-0.5 rounded font-bold border border-teal-300 tracking-wider flex items-center gap-0.5 shadow-sm"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>已完成</span>` : '';
            
            const visitCount = allApptsData.filter(a => a.phone === appt.phone).length;
            let vipBadge = '';
            if (visitCount <= 1) {
                vipBadge = `<span class="ml-1 text-[10px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-bold border border-emerald-200 tracking-wider">新客</span>`;
            } else {
                vipBadge = `<span class="ml-1 text-[10px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-bold border border-amber-300 tracking-wider">熟客</span>`;
            }

            const cust = globalDB.customers[appt.phone];
            const hasRecord = cust && cust.records && cust.records.find(r => r.id === appt.id && r.notes.trim() !== '');
            const btnStyle = hasRecord ? "bg-zinc-100 text-zinc-600 hover:bg-zinc-200" : "bg-teal-50 text-teal-700 hover:bg-teal-100 border border-teal-100";
            const btnText = hasRecord ? "檢視或修改紀錄" : "填寫服務紀錄";
            const checkIcon = hasRecord ? `<svg class="w-4 h-4 mr-1 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>` : '';

            return `
                <div class="p-5 border border-zinc-200 rounded-2xl bg-white shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] hover:border-teal-300 transition-colors flex flex-col ${isCompleted ? 'opacity-70 grayscale-[20%]' : ''}">
                    <div class="flex justify-between items-start mb-3 border-b border-zinc-100 pb-3">
                        <div class="flex flex-col gap-1">
                            <span class="text-xs font-bold bg-zinc-100 text-zinc-500 px-2 py-1 rounded w-fit uppercase tracking-wider flex items-center gap-1">${appt.date} ${completedBadge}</span>
                            <span class="text-lg font-black text-zinc-800 tracking-tight">${appt.time} <span class="text-xs text-zinc-400 font-medium">(${appt.duration}m)</span></span>
                        </div>
                        <span class="text-[10px] font-black ${roomBadgeColor} px-2.5 py-1 rounded border uppercase tracking-widest shadow-sm">${roomLabel}</span>
                    </div>
                    <div class="mb-5 flex-1">
                        <h4 class="font-black text-zinc-900 text-lg mb-1">${appt.customerName}</h4>
                        <p class="text-sm font-bold text-zinc-500">${serviceName}</p>
                    </div>
                    <button onclick="openTherapistRecordModal('${appt.id}')" class="w-full py-2.5 rounded-xl text-sm font-bold transition-colors flex items-center justify-center ${btnStyle}">
                        ${checkIcon} ${btnText}
                    </button>
                </div>`;
        };

        const therapistCutFor = (appt = {}) => Number(COURSE_CATALOG[appt.service]?.therapistCut || 0);
        const companyCutFor = (appt = {}) => Math.max(0, Number(appt.price || 0) - therapistCutFor(appt));
        const remittanceDueFor = (appt = {}) => {
            const manual = String(appt.remittanceDue || "").trim();
            return manual ? Math.max(0, Number(manual) || 0) : companyCutFor(appt);
        };
        const hasRemittance = (appt = {}) => Number(appt.collectedPrice || 0) > 0 || String(appt.remittancePaid) === 'true';
        const isCompletedAppt = (appt = {}) => appt.isCompleted === true || String(appt.isCompleted) === 'true';
        const formatMoney = (value = 0) => `$${(Number(value) || 0).toLocaleString()}`;
        const dateKeyFromDate = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        const addDays = (date, days) => {
            const next = new Date(date);
            next.setDate(next.getDate() + days);
            return next;
        };
        const servicePeriodStats = (appointments, start, end) => {
            const inRange = appointments.filter((appt) => appt.date >= start && appt.date <= end);
            const completed = inRange.filter(isCompletedAppt);
            const unpaid = completed.filter((appt) => !hasRemittance(appt));
            const paid = completed.filter(hasRemittance);
            return {
                items: inRange,
                completed,
                unpaid,
                paid,
                guests: completed.length,
                therapistCut: completed.reduce((sum, appt) => sum + therapistCutFor(appt), 0)
            };
        };
        const periodCardHtml = (label, stats) => `
            <div class="period-card">
                <p class="text-xs font-black text-zinc-500">${label}</p>
                <div class="period-card-grid">
                    <div><p class="text-[11px] font-bold text-zinc-400">服務</p><p class="metric-value">${stats.guests}</p></div>
                    <div><p class="text-[11px] font-bold text-zinc-400">抽成</p><p class="metric-value accent">${formatMoney(stats.therapistCut)}</p></div>
                    <div><p class="text-[11px] font-bold text-zinc-400">已回</p><p class="metric-value small text-indigo-700">${stats.paid.length} 筆</p></div>
                    <div><p class="text-[11px] font-bold text-zinc-400">未回</p><p class="metric-value small ${stats.unpaid.length ? 'text-rose-700' : 'text-zinc-400'}">${stats.unpaid.length} 筆</p></div>
                </div>
            </div>`;
        const upcomingItemHtml = (appt) => `
            <button onclick="openTherapistRecordModal('${appt.id}')" class="upcoming-item transition-colors">
                <div class="flex items-start justify-between gap-3">
                    <div><p class="font-black text-zinc-900">${appt.date} ${appt.time}</p><p class="mt-1 text-sm font-bold text-zinc-500">${esc(appt.customerName || '顧客')} · ${esc(COURSE_CATALOG[appt.service]?.name || appt.service || '服務')}</p></div>
                    <span class="rounded-full bg-teal-50 px-3 py-1 text-xs font-black text-teal-700">${appt.room === 'OUT' ? '外出' : `${appt.room || '-'}房`}</span>
                </div>
            </button>`;
        const remittanceRowsHtml = (items) => items.length ? items.map((appt) => `
            <div class="flex flex-col justify-between gap-2 rounded-xl border border-rose-100 bg-rose-50 px-4 py-3 text-sm sm:flex-row sm:items-center">
                <div><p class="font-black text-zinc-900">${appt.date} ${appt.time} · ${esc(appt.customerName || '顧客')}</p><p class="text-xs font-bold text-zinc-500">${esc(COURSE_CATALOG[appt.service]?.name || appt.service || '服務')}</p></div>
                <div class="font-black text-rose-700">應回 ${formatMoney(remittanceDueFor(appt))}</div>
            </div>`).join("") : `<div class="rounded-xl border border-dashed border-zinc-200 bg-zinc-50 px-4 py-6 text-center text-sm font-bold text-zinc-400">目前沒有未回款明細</div>`;
        const therapistOpsSummaryHtml = (appointments) => {
            const now = new Date();
            const today = dateKeyFromDate(now);
            const day = now.getDay() || 7;
            const weekStart = dateKeyFromDate(addDays(now, -day + 1));
            const weekEnd = dateKeyFromDate(addDays(now, 7 - day));
            const monthStart = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-01`;
            const monthEnd = monthDatesList[monthDatesList.length - 1]?.key || today;
            const currentMins = now.getHours() * 60 + now.getMinutes();
            const upcoming = appointments
                .filter((appt) => !isCompletedAppt(appt) && (appt.date > today || (appt.date === today && (timeToMinutes(appt.time) + (parseInt(appt.duration) || 60)) >= currentMins)))
                .slice(0, 3);
            const todayStats = servicePeriodStats(appointments, today, today);
            const weekStats = servicePeriodStats(appointments, weekStart, weekEnd);
            const monthStats = servicePeriodStats(appointments, monthStart, monthEnd);
            return `
                <div class="ops-grid">
                    <div class="ops-panel soft">
                        <div class="mb-4 flex items-center justify-between gap-3">
                            <div><h3 class="text-xl font-black text-zinc-900">服務與收入</h3><p class="text-sm font-bold text-zinc-500">完成服務後，數字會自動更新。</p></div>
                            <span class="rounded-full bg-white px-3 py-1 text-xs font-black text-zinc-500">本月 ${monthStats.items.length} 筆排程</span>
                        </div>
                        <div class="period-grid">${periodCardHtml('今日', todayStats)}${periodCardHtml('本週', weekStats)}${periodCardHtml('本月', monthStats)}</div>
                    </div>
                    <div class="ops-panel">
                        <h3 class="text-lg font-black text-zinc-900">下一個行程</h3>
                        <div class="mt-4 space-y-3">${upcoming.length ? upcoming.map(upcomingItemHtml).join("") : `<div class="rounded-xl border border-dashed border-zinc-200 bg-zinc-50 px-4 py-6 text-center text-sm font-bold text-zinc-400">目前沒有即將到來的行程</div>`}</div>
                    </div>
                </div>
                <div class="ops-panel">
                    <div class="mb-4 flex items-center justify-between gap-3">
                        <div><h3 class="font-black text-zinc-900">待回款</h3><p class="text-xs font-bold text-zinc-500">本月已完成、尚未回款的服務。</p></div>
                        <span class="rounded-full ${monthStats.unpaid.length ? 'bg-rose-50 text-rose-700' : 'bg-zinc-100 text-zinc-500'} px-3 py-1 text-xs font-black">${monthStats.unpaid.length} 筆</span>
                    </div>
                    <div class="space-y-2">${remittanceRowsHtml(monthStats.unpaid)}</div>
                </div>`;
        };

        window.renderMyAppointments = function() {
            const listContainer = document.getElementById('myAppointmentsContainer');
            const calContainer = document.getElementById('myAppointmentsCalendarGrid');
            if(!listContainer || !calContainer) return;
            
            calContainer.innerHTML = '';
            
            const allApptsData = Object.values(globalDB.appointments || {});
            const monthKeys = monthDatesList.map(d => d.key);
            let myAppts = allApptsData.filter(a => a.therapistId === currentUserId && monthKeys.includes(a.date));
            
            myAppts.sort((a, b) => {
                if (a.date !== b.date) return a.date.localeCompare(b.date);
                return a.time.localeCompare(b.time);
            });

            // ===== 渲染列表模式 (智慧時序分類) =====
            if (myAppts.length === 0) {
                listContainer.innerHTML = therapistOpsSummaryHtml(myAppts) + `<div class="py-12 text-center text-zinc-400 font-medium border border-dashed border-zinc-200 rounded-2xl bg-zinc-50 w-full">本月目前尚無您的預約排程</div>`;
            } else {
                const now = new Date();
                const formatD = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                const todayStr = formatD(now);
                const currentMins = now.getHours() * 60 + now.getMinutes();

                const dayOfWeek = now.getDay() || 7; 
                const weekStart = new Date(now);
                weekStart.setDate(now.getDate() - dayOfWeek + 1);
                const weekEnd = new Date(now);
                weekEnd.setDate(now.getDate() - dayOfWeek + 7);
                const weekStartStr = formatD(weekStart);
                const weekEndStr = formatD(weekEnd);

                let nextAppt = null;
                let todayAppts = [];
                let weekAppts = [];
                let monthAppts = [];

                myAppts.forEach(appt => {
                    const apptStartMins = timeToMinutes(appt.time);
                    const apptEndMins = apptStartMins + (parseInt(appt.duration) || 60);
                    const isCompleted = appt.isCompleted === true || String(appt.isCompleted) === 'true';

                    if (!nextAppt && !isCompleted && (appt.date > todayStr || (appt.date === todayStr && apptEndMins > currentMins))) {
                        nextAppt = appt;
                        return;
                    }

                    if (appt.date === todayStr) { todayAppts.push(appt); return; }
                    if (appt.date >= weekStartStr && appt.date <= weekEndStr) { weekAppts.push(appt); return; }
                    monthAppts.push(appt);
                });

                let listHtml = '';
                
                if (nextAppt) {
                    listHtml += `
                        <div>
                            <h4 class="text-sm font-bold text-teal-700 mb-4 flex items-center gap-2">
                                <span class="relative flex h-2.5 w-2.5">
                                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
                                  <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-teal-500"></span>
                                </span> 
                                下一個行程 / 進行中
                            </h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${createApptCardHtml(nextAppt, allApptsData)}</div>
                        </div>`;
                }

                if (todayAppts.length > 0) {
                    listHtml += `
                        <div>
                            <h4 class="text-sm font-bold text-zinc-600 mb-4 flex items-center gap-2 border-b border-zinc-200/60 pb-2">今日行程</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${todayAppts.map(a => createApptCardHtml(a, allApptsData)).join('')}</div>
                        </div>`;
                }

                if (weekAppts.length > 0) {
                    listHtml += `
                        <div>
                            <h4 class="text-sm font-bold text-zinc-600 mb-4 flex items-center gap-2 border-b border-zinc-200/60 pb-2">本週行程</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${weekAppts.map(a => createApptCardHtml(a, allApptsData)).join('')}</div>
                        </div>`;
                }

                if (monthAppts.length > 0) {
                    listHtml += `
                        <div>
                            <h4 class="text-sm font-bold text-zinc-600 mb-4 flex items-center gap-2 border-b border-zinc-200/60 pb-2">本月其餘行程</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${monthAppts.map(a => createApptCardHtml(a, allApptsData)).join('')}</div>
                        </div>`;
                }

                listContainer.innerHTML = therapistOpsSummaryHtml(myAppts) + listHtml;
            }

            // ===== 渲染日曆模式 =====
            const firstDay = monthDatesList[0].rawDay; 
            for(let i = 0; i < firstDay; i++) {
                calContainer.innerHTML += `<div class="bg-transparent rounded-xl"></div>`;
            }

            const todayStr = new Date().toISOString().split('T')[0];

            monthDatesList.forEach(d => {
                const dayAppts = myAppts.filter(a => a.date === d.key);
                let apptsHtml = '';
                
                dayAppts.forEach(appt => {
                    const isCompleted = appt.isCompleted === true || String(appt.isCompleted) === 'true';
                    const styleClass = isCompleted ? "bg-zinc-100 text-zinc-400 line-through border-transparent" : "bg-teal-50 text-teal-700 hover:bg-teal-100 border border-teal-100 shadow-[0_1px_2px_rgba(0,0,0,0.02)]";
                    apptsHtml += `
                        <div onclick="openTherapistRecordModal('${appt.id}')" class="mb-1.5 p-1 md:px-2 md:py-1.5 rounded-lg text-[9px] md:text-xs truncate cursor-pointer transition-all ${styleClass}" title="${appt.time} ${appt.customerName} - 點擊編輯紀錄">
                            <span class="font-black tracking-tight">${appt.time}</span> <span class="font-medium">${appt.customerName}</span>
                        </div>
                    `;
                });
                
                const isToday = d.key === todayStr;
                const dateBadgeStyle = isToday ? "bg-teal-600 text-white w-6 h-6 md:w-7 md:h-7 rounded-full flex items-center justify-center shadow-md" : (d.isWeekend ? "text-rose-400" : "text-zinc-500");

                calContainer.innerHTML += `
                    <div class="bg-white border border-zinc-200 rounded-2xl p-1.5 md:p-3 min-h-[90px] md:min-h-[130px] flex flex-col hover:border-teal-300 transition-colors shadow-sm relative overflow-hidden group">
                        <div class="absolute top-0 left-0 w-full h-1 ${isToday ? 'bg-teal-400' : 'bg-transparent'}"></div>
                        <div class="mb-2 flex justify-end">
                            <span class="text-[10px] md:text-xs font-bold ${dateBadgeStyle}">${d.dayDisplay}</span>
                        </div>
                        <div class="flex-1 overflow-y-auto no-scrollbar pb-1">
                            ${apptsHtml}
                        </div>
                    </div>
                `;
            });
        };

        window.openTherapistRecordModal = async function(appId) {
            const appt = globalDB.appointments[appId];
            if (!appt) return;

            currentReportingApptId = appId;
            currentReportingPhone = appt.phone;
            
            document.getElementById('trModalCustomerName').innerText = appt.customerName;
            const serviceName = COURSE_CATALOG[appt.service] ? COURSE_CATALOG[appt.service].name : (appt.service || '一般預約');
            document.getElementById('trModalServiceInfo').innerText = `${appt.date} / ${appt.time} - ${serviceName}`;
            
            const cust = globalDB.customers[appt.phone];
            const existingRecord = cust && cust.records ? cust.records.find(r => r.id === appId) : null;
            document.getElementById('trModalNotes').value = existingRecord ? existingRecord.notes : '';
            
            document.getElementById('trModalCollectedPrice').value = appt.collectedPrice || '';
            document.getElementById('trModalIsCompleted').checked = appt.isCompleted === true || String(appt.isCompleted) === 'true';
            
            document.getElementById('trModalErrorMsg').classList.add('hidden');
            document.getElementById('trModalSubmitBtn').innerText = "儲存入檔";
            
            document.getElementById('therapistRecordModal').classList.remove('hidden');
        };

        window.closeTherapistRecordModal = function() {
            currentReportingApptId = null;
            currentReportingPhone = null;
            document.getElementById('therapistRecordModal').classList.add('hidden');
        };

        window.submitTherapistRecord = async function() {
            const notes = document.getElementById('trModalNotes').value.trim();
            const collectedPrice = document.getElementById('trModalCollectedPrice').value.trim();
            const isCompleted = document.getElementById('trModalIsCompleted').checked;
            const errMsg = document.getElementById('trModalErrorMsg');
            const btn = document.getElementById('trModalSubmitBtn');

            if (!notes) { errMsg.innerText = "服務細節不可為空白喔！"; errMsg.classList.remove('hidden'); return; }
            if (!currentReportingPhone || !currentReportingApptId) return;

            const appt = globalDB.appointments[currentReportingApptId];
            if (!appt) return;

            btn.disabled = true; btn.innerText = "資料寫入中..."; errMsg.classList.add('hidden');

            const cust = globalDB.customers[currentReportingPhone] || { name: appt.customerName, notes: '', records: [] };
            cust.records = cust.records || [];
            
            let existingIdx = cust.records.findIndex(r => r.id === currentReportingApptId);
            const reportingTherapistName = globalDB.therapists[appt.therapistId] ? therapistName(appt.therapistId) : '未指定';
            
            if (existingIdx > -1) {
                cust.records[existingIdx].notes = notes;
                cust.records[existingIdx].date = appt.date;
                cust.records[existingIdx].service = appt.service;
            } else {
                cust.records.push({
                    id: currentReportingApptId,
                    date: appt.date,
                    therapistId: appt.therapistId,
                    therapistName: reportingTherapistName,
                    service: appt.service,
                    notes: notes
                });
            }

            try {
                appt.collectedPrice = collectedPrice;
                appt.isCompleted = isCompleted;
                appt.bookingStage = isCompleted ? 'completed' : (appt.bookingStage || 'confirmed');
                const appointmentData = {
                    ...appt,
                    appId: appt.id,
                    collectedPrice,
                    isCompleted,
                    bookingStage: appt.bookingStage,
                    remittanceDue: appt.remittanceDue || '',
                    remittancePaid: appt.remittancePaid === true || String(appt.remittancePaid) === 'true',
                    remittanceMethod: appt.remittanceMethod || '',
                    notes: appt.notes || ''
                };
                const meta = {
                    id: appt.id,
                    bookingStage: appointmentData.bookingStage,
                    isCompleted: appointmentData.isCompleted,
                    collectedPrice: appointmentData.collectedPrice,
                    remittanceDue: appointmentData.remittanceDue,
                    remittancePaid: appointmentData.remittancePaid,
                    remittanceMethod: appointmentData.remittanceMethod,
                    selectionId: appointmentData.selectionId || ''
                };
                const metaKey = appointmentMetaKey(appt.id);
                const metaStore = { name: `預約狀態-${appt.id}`, notes: JSON.stringify(meta), records: [] };
                await postActionsAndVerify([
                    { action: 'saveCustomer', data: { phone: currentReportingPhone, name: cust.name, notes: cust.notes, records: cust.records } },
                    { action: 'addAppointment', data: appointmentData },
                    { action: 'saveCustomer', data: { phone: metaKey, ...metaStore } }
                ], cloud => {
                    const saved = cloud.appointments?.[appt.id];
                    const savedMeta = cloud.customers?.[metaKey];
                    return saved
                        && String(saved.collectedPrice || '') === String(collectedPrice || '')
                        && (saved.bookingStage === appointmentData.bookingStage || JSON.parse(savedMeta?.notes || '{}').bookingStage === appointmentData.bookingStage)
                        && Boolean(savedMeta);
                }, "服務紀錄");

                globalDB.customers[currentReportingPhone] = cust;
                globalDB.appointments[currentReportingApptId] = appt;
                globalDB.customers[metaKey] = metaStore;

                renderMyAppointments(); 
                closeTherapistRecordModal();
                showSnackbar("服務紀錄與帳務狀態已成功同步！", "success");
            } catch (e) {
                errMsg.innerText = "儲存失敗，請檢查網路連線。"; errMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false; btn.innerText = "儲存入檔";
            }
        };

        window.logout = function() {
            currentUserId = null; document.getElementById('authPin').value = '';
            document.getElementById('editForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden');
            generateMonthData(); 
        };

        generateMonthData();
    </script>
</body>
</html>
